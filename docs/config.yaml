  - tag: cold-DDI
    description: 与严格冷启动药物-药物相互作用预测（strict cold-start DDI prediction）相关的论文，重点关注以下方向：利用大型语言模型（LLM）增强药物语义表示或医学知识表示；利用生物医学知识图谱（biomedical knowledge graph）进行药物相互作用预测；面向新药/冷启动药物的知识迁移、跨域对齐、教师-学生蒸馏方法；将AI Agent / 多智能体（multi-agent）用于药物相互作用预测、科学推理、知识检索或证据整合的相关工作；与上述方向相关的DDI、drug recommendation、drug repurposing、biomedical reasoning论文。请优先返回近3年高质量论文，并尽量区分：普通DDI预测、冷启动DDI预测、LLM/Agent增强DDI预测三类工作。
