  - tag: mgp
    description: 请帮我找利用大规模无标签分子数据进行预训练，以提升未见药物预测能力的研究。重点关注分子图预训练、自监督分子表示学习、掩码原子或子结构预测、图对比学习、分子语言模型以及预训练—微调范式。关注预训练模型如何覆盖更广泛的化学空间，并缓解冷启动药物由于训练样本不足或结构新颖造成的表示缺失问题。优先返回在药物相互作用预测、药物属性预测、药物靶点预测和分子分布外泛化任务中验证过的方法。
