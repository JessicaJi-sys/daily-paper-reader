    - tag: cold-DDI
      description: >-
        检索从具有丰富交互记录的已知药物向未见药物迁移知识的相关研究，重点关注如何根据分子结构、生物功能和药物语义相似性，为没有DDI历史的新药寻找可参考的已知药物。关注相似药物检索、邻近药物经验聚合、原型学习、检索增强表示、归纳式知识迁移以及群体知识向冷启动实体迁移的方法。研究范围可以适当扩展至冷启动推荐、药物推荐、药物重定位和图上的冷启动节点预测，但优先返回能够迁移到冷启动DDI预测任务的方法。
