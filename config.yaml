  - tag: cd
    description: 请帮我找检索利用生物医学知识图谱和生物学先验增强冷启动药物预测的研究。重点关注药物与靶点、蛋白质、基因、通路、疾病、药物类别、代谢酶和转运体之间的非DDI关系，以及这些知识如何补充未见药物缺失的交互历史。关注异构图神经网络、知识图谱表示学习、关系感知聚合、元路径学习、局部子图编码和知识增强药物表示方法。优先返回知识图谱增强的DDI预测、新药预测、药物重定位和生物医学图归纳学习相关论文。
